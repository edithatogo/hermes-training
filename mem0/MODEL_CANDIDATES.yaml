# Candidate radar for mem0 extraction, embedding, reranking, and retrieval.
project_target: "Local mem0 memory for Codex, Cline, Hermes, and other CLI agents"
latest_release_recheck: "2026-05-26: Hugging Face metadata refresh found newer Mac/retrieval candidates including jinaai/jina-embeddings-v5-omni-small-mlx, Qwen3 reranker ONNX/GGUF variants, BAAI bge-reranker-v2-m3 MLX builds, and recent Qwen3.6 GGUF packages. Keep BGE-M3 and the margin-gated read wrapper as the validated local mem0 path; treat new candidates as acquisition/load-proof targets."
latest_local_benchmark: "2026-05-26: BGE-M3 dense retrieval reached top-1 0.917 / recall@3 1.000 on the expanded 12-case suite; nomic reached top-1 0.833 / recall@3 1.000 from the clean SSD Ollama root. score_plus_created_at_rank_close_margin reached 1.000 on BGE-derived reranking and 0.917 on nomic-derived reranking. Qwen/Qwen3-Reranker-0.6B causal-LM scoring reached 1.000 on the fixed suite and both BGE/nomic expanded derived suites; live read-only mem0 wrapper smoke passed with 0.216s scoring latency but 12.093s one-shot total latency due model load. Warm-helper live smoke reduced the second service-backed request to 4.112s total with 0.119s Qwen scoring. Multi-result replay through the live-wrapper abstraction reached top-1 1.000 for warm Qwen3 on fixed, BGE-derived, and nomic-derived suites, while the close-margin heuristic stayed at 0.917 on nomic-derived replay. Isolated live fixture add/search returned 3-5 candidates per query; close-margin reached top-1 1.000, while warm Qwen3 matched vector at top-1 0.667. Guarded read wrapper scripts/mem0_read.py now exposes close-margin reads without changing defaults; singleton live smoke completed in 2.865s and 5-query UX latency probe reached p50 2.897s / p95 3.729s, so use as explicit/cached memory-read tool rather than every-turn prelude. Opt-in cache benchmark reached 5 cache hits across 10 calls with cold p50 2.904s and cache-hit p50 0.000s. Keep nomic as the default rollback embedder and keep BGE-M3 side-by-side until any default config integration is intentionally selected. LFM2 clean-root extraction smoke passed 7/7 with JSON validity 1.000 and p50 latency 0.874s."
current_default:
  vector_store: qdrant
  collection: mem0_nomic_768
  embedder: nomic-embed-text:latest
  embedder_runtime: ollama
  embedding_dims: 768
  extractor: sam860/LFM2:2.6b
  extractor_runtime: ollama
  status: working-default

candidates:
  - id: nomic-embed-text:latest
    role: embedder
    family: dense-embedding
    runtime:
      - ollama
    embedding_dims: 768
    status: working-default
    first_gate: add-search-smoke
    notes: "Current stable local baseline. Keep as rollback target while testing stronger embedders. 2026-05-26 expanded suite: top-1 0.833 / recall@3 1.000, p50 0.021s; close-margin rerank reached 0.917."

  - id: BAAI/bge-m3
    role: embedder
    family: dense-sparse-multivector
    runtime:
      - sentence-transformers
      - transformers
      - llama.cpp-if-supported
    embedding_dims: 1024
    status: benchmarked-cpu-mps-not-promoted
    first_gate: mteb-retrieval-smoke
    notes: "Strong practical retrieval baseline. Use a separate Qdrant collection because dimensions differ from nomic. 2026-05-26: CPU and MPS sentence-transformers smokes completed from SSD cache at 1024 dims. Expanded CPU suite reached top-1 0.917 / recall@3 1.000, but still missed current-vs-old preference without reranking."

  - id: jinaai/jina-embeddings-v4
    role: embedder
    family: multilingual-multimodal-embedding
    runtime:
      - sentence-transformers
      - transformers
      - mlx-if-supported
    embedding_dims: variable
    status: candidate
    first_gate: mteb-retrieval-smoke
    notes: "Candidate for broader document and memory retrieval. Verify local Mac runtime and dimensions before indexing."

  - id: jinaai/jina-embeddings-v5-omni-small-mlx
    role: embedder
    family: mlx-multimodal-embedding
    runtime:
      - mlx
    embedding_dims: variable
    status: candidate
    first_gate: local-embedding-smoke
    notes: "2026-05-26 Hugging Face refresh found Jina v5 omni MLX variants. Candidate for Apple Silicon embedding smoke after BGE-M3/nomic comparison."

  - id: Qwen/Qwen3-Embedding-4B
    role: embedder
    family: qwen-embedding
    runtime:
      - transformers
