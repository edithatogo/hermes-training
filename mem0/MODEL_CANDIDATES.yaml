  - id: onnx-community/Qwen3-Reranker-0.6B-ONNX
    role: reranker
    family: onnx-causal-lm-reranker
    runtime:
      - onnxruntime
      - transformers.js
    embedding_dims: null
    status: source-model-benchmarked
    first_gate: rerank-smoke
    notes: "Smaller 2026-05-26 refresh candidate for local reranking. Public ONNX package targets Transformers.js; Python fixed-suite smoke uses the source Qwen/Qwen3-Reranker-0.6B model with the same yes/no causal-LM scoring. Source model passed fixed 6-case and BGE/nomic expanded 12-case reranking suites at top-1 1.000. Live read-only wrapper smoke passed; warm helper reduced repeat-request Qwen scoring latency to 0.119s and total wrapper latency to 4.112s on a single-result live query. Multi-result replay through the wrapper reached top-1 1.000 on fixed, BGE-derived, and nomic-derived suites with p50 scoring around 0.25s to 0.28s on expanded suites. Isolated live fixture reached only top-1 0.667, matching vector and missing a recency lane. ONNX/Transformers.js bridge failed closed: Node supports cpu/webgpu rather than wasm, and CPU q4 timed out after 180.0s on one fixed-suite case at max length 512. Do not promote ONNX until a bounded CPU/CoreML proof passes."

  - id: flaglow/BAAI-bge-reranker-v2-m3-mlx-mxfp8-8bit
    role: reranker
    family: mlx-cross-encoder-reranker
    runtime:
      - mlx
    embedding_dims: null
    status: isolated-fixture-proven
    first_gate: multi-query-cold-warm-latency-probe
    notes: "2026-05-26 refresh verified this public 8-bit MLX build after the placeholder BAAI/bge-reranker-v2-m3-mlx repo 404ed. MLX cross-encoder harness with native paired tokenization passed fixed, BGE-derived expanded, and nomic-derived expanded suites at top-1 1.000 / recall@3 1.000. Isolated live fixture reached pass/top-1 1.000 with p50 rerank latency 0.145s. First bounded cache-hit daily-use probe reached 4.610s total / 0.059s rerank latency after an unbounded in-process load attempt stalled; run a broader cold/warm probe before default integration. Exposed as opt-in mlx-bge mode in the guarded mem0 read wrapper and Hermes mem0 tool with vector fallback; defaults remain unchanged."

  - id: flaglow/BAAI-bge-reranker-v2-m3-mlx-fp16
    role: reranker
    family: mlx-cross-encoder-reranker
    runtime:
      - mlx
    embedding_dims: null
