# Candidate radar for mem0 extraction, embedding, reranking, and retrieval.
project_target: "Local mem0 memory for Codex, Cline, Hermes, and other CLI agents"
latest_release_recheck: "2026-05-26: Hugging Face metadata refresh found newer Mac/retrieval candidates including jinaai/jina-embeddings-v5-omni-small-mlx, Qwen3 reranker ONNX/GGUF variants, BAAI bge-reranker-v2-m3 MLX builds, and recent Qwen3.6 GGUF packages. Keep BGE-M3 and the margin-gated read wrapper as the validated local mem0 path; treat new candidates as acquisition/load-proof targets."
latest_local_benchmark: "2026-05-26: BGE-M3 dense retrieval reached top-1 0.917 / recall@3 1.000 on the expanded 12-case suite; nomic reached top-1 0.833 / recall@3 1.000 from the clean SSD Ollama root. score_plus_created_at_rank_close_margin reached 1.000 on BGE-derived reranking and 0.917 on nomic-derived reranking. Keep nomic as the default rollback embedder, keep BGE-M3 side-by-side, and use the margin-gated wrapper as the validated next read path. LFM2 clean-root extraction smoke passed 7/7 with JSON validity 1.000 and p50 latency 0.874s."
current_default:
  vector_store: qdrant
  collection: mem0_nomic_768
  embedder: nomic-embed-text:latest
  embedder_runtime: ollama
  embedding_dims: 768
  extractor: sam860/LFM2:2.6b
  extractor_runtime: ollama
  status: working-default

candidates:
  - id: nomic-embed-text:latest
    role: embedder
    family: dense-embedding
    runtime:
      - ollama
    embedding_dims: 768
    status: working-default
    first_gate: add-search-smoke
    notes: "Current stable local baseline. Keep as rollback target while testing stronger embedders. 2026-05-26 expanded suite: top-1 0.833 / recall@3 1.000, p50 0.021s; close-margin rerank reached 0.917."

  - id: BAAI/bge-m3
    role: embedder
    family: dense-sparse-multivector
    runtime:
      - sentence-transformers
      - transformers
      - llama.cpp-if-supported
    embedding_dims: 1024
    status: benchmarked-cpu-mps-not-promoted
    first_gate: mteb-retrieval-smoke
    notes: "Strong practical retrieval baseline. Use a separate Qdrant collection because dimensions differ from nomic. 2026-05-26: CPU and MPS sentence-transformers smokes completed from SSD cache at 1024 dims. Expanded CPU suite reached top-1 0.917 / recall@3 1.000, but still missed current-vs-old preference without reranking."

  - id: jinaai/jina-embeddings-v4
    role: embedder
    family: multilingual-multimodal-embedding
    runtime:
      - sentence-transformers
      - transformers
      - mlx-if-supported
    embedding_dims: variable
    status: candidate
    first_gate: mteb-retrieval-smoke
    notes: "Candidate for broader document and memory retrieval. Verify local Mac runtime and dimensions before indexing."

  - id: jinaai/jina-embeddings-v5-omni-small-mlx
    role: embedder
    family: mlx-multimodal-embedding
    runtime:
      - mlx
    embedding_dims: variable
    status: candidate
    first_gate: local-embedding-smoke
    notes: "2026-05-26 Hugging Face refresh found Jina v5 omni MLX variants. Candidate for Apple Silicon embedding smoke after BGE-M3/nomic comparison."

  - id: Qwen/Qwen3-Embedding-4B
    role: embedder
    family: qwen-embedding
    runtime:
      - transformers
      - mlx-if-supported
      - llama.cpp-if-supported
    embedding_dims: unknown
    status: candidate
    first_gate: local-embedding-smoke
    notes: "Potential high-quality local embedder. Runtime and memory footprint must be proven on the M1 Max before use."

  - id: Qwen/Qwen3-Reranker-4B
    role: reranker
    family: cross-encoder-reranker
    runtime:
      - transformers
      - mlx-if-supported
    embedding_dims: null
    status: candidate
    first_gate: rerank-smoke
    notes: "Use after dense retrieval to improve precision. Not a vector-store replacement."

  - id: Qwen/Qwen3-Reranker-0.6B-ONNX
    role: reranker
    family: onnx-cross-encoder-reranker
    runtime:
      - onnxruntime
    embedding_dims: null
    status: candidate
    first_gate: rerank-smoke
    notes: "Smaller 2026-05-26 refresh candidate for local reranking. Prefer before 4B if the goal is low-latency mem0 read rerank."

  - id: BAAI/bge-reranker-v2-m3-mlx
    role: reranker
    family: mlx-cross-encoder-reranker
    runtime:
      - mlx
    embedding_dims: null
    status: candidate
    first_gate: rerank-smoke
    notes: "2026-05-26 refresh found fp16 and 8-bit MLX builds. Candidate Apple Silicon reranker against the expanded mem0 suite."

  - id: mem0-created-at-rank-reranker
    role: reranker
    family: heuristic-recency-reranker
    runtime:
      - local-python
    embedding_dims: null
    status: live-read-wrapper-smoked
    first_gate: rerank-smoke
    notes: "Offline and fixed-suite prototype. score_plus_created_at_rank_close_margin with weight 0.20 reached 1.000 on the BGE-derived expanded suite and 0.917 on the nomic-derived expanded suite by fixing close recency conflicts without over-promoting large-margin newer distractors. Use through read-only wrapper first; compare against learned rerankers before live default integration."

  - id: LiquidAI/LFM2-ColBERT-350M
    role: retriever
    family: late-interaction
