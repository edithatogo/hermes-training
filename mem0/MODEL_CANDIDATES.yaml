# Candidate radar for mem0 extraction, embedding, reranking, and retrieval.
project_target: "Local mem0 memory for Codex, Cline, Hermes, and other CLI agents"
latest_release_recheck: "2026-05-24: Hugging Face metadata check verified BAAI/bge-m3, jinaai/jina-embeddings-v4, Qwen/Qwen3-Embedding-4B, Qwen/Qwen3-Reranker-4B, LiquidAI/LFM2-ColBERT-350M, and NousResearch/Hermes-4-14B. Ollama-style ids were skipped by the HF check."
latest_local_benchmark: "2026-05-26: BGE-M3 acquired and CPU-smoked from the SSD cache at 1024 dims. It matched nomic on the tiny retrieval suite top-1 0.667 / recall@3 1.000 but was slower and still missed the recency case, so nomic remains the default. LFM2 extractor and score_plus_created_at_rank reranking remain the strongest mem0 improvements."
current_default:
  vector_store: qdrant
  collection: mem0_nomic_768
  embedder: nomic-embed-text:latest
  embedder_runtime: ollama
  embedding_dims: 768
  extractor: sam860/LFM2:2.6b
  extractor_runtime: ollama
  status: working-default

candidates:
  - id: nomic-embed-text:latest
    role: embedder
    family: dense-embedding
    runtime:
      - ollama
    embedding_dims: 768
    status: working-default
    first_gate: add-search-smoke
    notes: "Current stable local baseline. Keep as rollback target while testing stronger embedders."

  - id: BAAI/bge-m3
    role: embedder
    family: dense-sparse-multivector
    runtime:
      - sentence-transformers
      - transformers
      - llama.cpp-if-supported
    embedding_dims: 1024
    status: benchmarked-cpu-not-promoted
    first_gate: mteb-retrieval-smoke
    notes: "Strong practical retrieval baseline. Use a separate Qdrant collection because dimensions differ from nomic. 2026-05-26: CPU sentence-transformers smoke completed from SSD cache at 1024 dims, top-1 0.667 / recall@3 1.000, matching nomic on the small suite but slower and not fixing recency top-1."

  - id: jinaai/jina-embeddings-v4
    role: embedder
    family: multilingual-multimodal-embedding
    runtime:
      - sentence-transformers
      - transformers
      - mlx-if-supported
    embedding_dims: variable
    status: candidate
    first_gate: mteb-retrieval-smoke
    notes: "Candidate for broader document and memory retrieval. Verify local Mac runtime and dimensions before indexing."

  - id: Qwen/Qwen3-Embedding-4B
    role: embedder
    family: qwen-embedding
    runtime:
      - transformers
      - mlx-if-supported
      - llama.cpp-if-supported
    embedding_dims: unknown
    status: candidate
    first_gate: local-embedding-smoke
    notes: "Potential high-quality local embedder. Runtime and memory footprint must be proven on the M1 Max before use."

  - id: Qwen/Qwen3-Reranker-4B
    role: reranker
    family: cross-encoder-reranker
    runtime:
      - transformers
      - mlx-if-supported
    embedding_dims: null
    status: candidate
    first_gate: rerank-smoke
    notes: "Use after dense retrieval to improve precision. Not a vector-store replacement."

  - id: mem0-created-at-rank-reranker
    role: reranker
    family: heuristic-recency-reranker
    runtime:
      - local-python
    embedding_dims: null
    status: candidate
    first_gate: rerank-smoke
    notes: "Offline and fixed-suite prototype. score_plus_created_at_rank with weight 0.20 fixed the expanded recency suite and fixed reranking suite, but needs learned-reranker comparison or larger validation before live default use."

  - id: LiquidAI/LFM2-ColBERT-350M
    role: retriever
    family: late-interaction
    runtime:
      - transformers
      - llama.cpp-after-local-patch
      - mlx-if-supported
    embedding_dims: late-interaction
    status: candidate
    first_gate: colbert-index-smoke
    notes: "Promising mem0/RAG direction. Needs its own index shape and API; do not put ColBERT vectors in the nomic Qdrant collection."

  - id: sam860/LFM2:2.6b
    role: extractor
    family: local-llm
    runtime:
      - ollama
    embedding_dims: null
    status: working-default
    first_gate: extraction-smoke
    notes: "Current extraction model in mem0 config and rollback extractor. Passed expanded extraction suite at 1.000 with stricter prompt examples."

  - id: hermes3:8b
    role: extractor
    family: hermes-chat
    runtime:
      - ollama
    embedding_dims: null
    status: installed-baseline
    first_gate: extraction-smoke
    notes: "Installed local Hermes-style baseline. Compare extraction quality and latency against LFM2 before using daily."

  - id: NousResearch/Hermes-4-14B
    role: extractor
    family: hermes-chat
    runtime:
      - ollama-gguf
      - lm-studio-gguf
      - transformers
    embedding_dims: null
    status: runtime-proof-needed
    first_gate: endpoint-smoke
    notes: "Teacher/baseline candidate for memory extraction once a local artifact or endpoint is available."

collections:
  - name: mem0_nomic_768
    dims: 768
    role: default
    compatible_models:
      - nomic-embed-text:latest
    status: active

  - name: mem0_bge_m3_1024
    dims: 1024
    role: candidate
    compatible_models:
      - BAAI/bge-m3
    status: config-created-not-default

  - name: mem0_qwen3_embedding_4b
    dims: verify-before-create
    role: candidate
    compatible_models:
      - Qwen/Qwen3-Embedding-4B
    status: planned
