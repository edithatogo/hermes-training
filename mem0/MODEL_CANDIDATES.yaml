    notes: "Current extraction model in mem0 config and rollback extractor. Passed expanded extraction suite at 1.000 with stricter prompt examples. 2026-05-26: pulled into /Volumes/PortableSSD/Ollama/mem0-clean-models and clean-root smoke passed 7/7 with JSON validity 1.000 and p50 latency 0.874s."

  - id: hermes3:8b
    role: extractor
    family: hermes-chat
    runtime:
      - ollama
    embedding_dims: null
    status: installed-baseline
    first_gate: extraction-smoke
    notes: "Installed local Hermes-style baseline. Compare extraction quality and latency against LFM2 before using daily."

  - id: NousResearch/Hermes-4-14B
    role: extractor
