  - id: onnx-community/Qwen3-Reranker-0.6B-ONNX
    role: reranker
    family: onnx-causal-lm-reranker
    runtime:
      - onnxruntime
    embedding_dims: null
    status: source-model-benchmarked
    first_gate: rerank-smoke
    notes: "Smaller 2026-05-26 refresh candidate for local reranking. Public ONNX package targets Transformers.js; Python fixed-suite smoke uses the source Qwen/Qwen3-Reranker-0.6B model with the same yes/no causal-LM scoring until the ONNX bridge is added. Source model passed fixed 6-case and BGE/nomic expanded 12-case reranking suites at top-1 1.000. Live read-only wrapper smoke passed; warm helper reduced repeat-request Qwen scoring latency to 0.119s and total wrapper latency to 4.112s on a single-result live query. Multi-result replay through the wrapper reached top-1 1.000 on fixed, BGE-derived, and nomic-derived suites with p50 scoring around 0.25s to 0.28s on expanded suites. Isolated live fixture reached only top-1 0.667, matching vector and missing a recency lane; needs prompt/metadata work before promotion."

  - id: BAAI/bge-reranker-v2-m3-mlx
    role: reranker
    family: mlx-cross-encoder-reranker
    runtime:
      - mlx
    embedding_dims: null
    status: candidate
    first_gate: rerank-smoke
    notes: "2026-05-26 refresh found fp16 and 8-bit MLX builds. Candidate Apple Silicon reranker against the expanded mem0 suite."

  - id: mem0-created-at-rank-reranker
    role: reranker
    family: heuristic-recency-reranker
    runtime:
      - local-python
    embedding_dims: null
    status: live-read-wrapper-smoked
    first_gate: rerank-smoke
    notes: "Offline and fixed-suite prototype. score_plus_created_at_rank_close_margin with weight 0.20 reached 1.000 on the BGE-derived expanded suite, 0.917 on the nomic-derived expanded suite, 1.000 on wrapper replay fixed/BGE suites, and 1.000 on the isolated live fixture by fixing close recency conflicts without over-promoting large-margin newer distractors. Guarded read wrapper scripts/mem0_read.py exposes this path without changing mem0 defaults; rollback is raw mem0 search."

  - id: LiquidAI/LFM2-ColBERT-350M
