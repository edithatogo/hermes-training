    notes: "Promising mem0/RAG direction. Needs its own index shape and API; do not put ColBERT vectors in the nomic Qdrant collection."

  - id: sam860/LFM2:2.6b
    role: extractor
    family: local-llm
    runtime:
      - ollama
    embedding_dims: null
